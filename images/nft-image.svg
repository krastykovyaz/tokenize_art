<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="numberGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffed4e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="500" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="#ffffff" opacity="0.1"/>
  <circle cx="400" cy="400" r="80" fill="#ffffff" opacity="0.1"/>
  <circle cx="450" cy="100" r="40" fill="#ffffff" opacity="0.1"/>
  
  <!-- Main content frame -->
  <rect x="50" y="50" width="400" height="400" rx="20" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.3"/>
  
  <!-- Title -->
  <text x="250" y="120" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">
    TokenizeArt
  </text>
  
  <!-- The number 42 - large and prominent -->
  <text x="250" y="280" font-family="Arial, sans-serif" font-size="180" font-weight="bold" fill="url(#numberGradient)" text-anchor="middle" stroke="#ffffff" stroke-width="2">
    42
  </text>
  
  <!-- Subtitle -->
  <text x="250" y="360" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" opacity="0.9">
    Legendary NFT Collection
  </text>
  
  <!-- Bottom text -->
  <text x="250" y="420" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" opacity="0.7">
    Built on BNB Chain
  </text>
</svg>
